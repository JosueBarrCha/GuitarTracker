
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GuitarTrack">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <title>Guitar Tracker</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/11.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="auth-screen">
        <h1>🎸 Guitar Tracker</h1>
        <p>Sign in to sync your data across devices</p>
        <button class="auth-btn" onclick="signIn()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
            Sign in with Google
        </button>
    </div>

    <!-- LOADING -->
    <div id="loading-screen" class="loading" style="display:none">Loading...</div>

    <!-- APP -->
    <div id="app" class="app">

        <!-- ===== MOBILE LAYOUT ===== -->
        <div class="mobile-layout">
            <div class="mobile-header">
                <h1>🎸 Guitar Tracker</h1>
                <img id="mobile-avatar" class="user-avatar" onclick="signOut()" src="" alt="user">
            </div>

            <div id="m-alerts"></div>

            <div id="m-page-guitars" class="mobile-page active"></div>
            <div id="m-page-strings" class="mobile-page"></div>
            <div id="m-page-setups" class="mobile-page"></div>
            <div id="m-page-settings" class="mobile-page"></div>

            <button class="fab" id="m-fab" onclick="handleFab()">+</button>

            <nav class="bottom-nav">
                <button class="nav-item active" data-page="guitars"><span class="icon">🎸</span>Guitars</button>
                <button class="nav-item" data-page="strings"><span class="icon">🎵</span>Strings</button>
                <button class="nav-item" data-page="setups"><span class="icon">🔧</span>Setups</button>
                <button class="nav-item" data-page="settings"><span class="icon">⚙️</span>Settings</button>
            </nav>
        </div>

        <!-- ===== DESKTOP LAYOUT ===== -->
        <div class="desktop-layout">
            <aside class="desktop-sidebar">
                <h1>🎸 Guitar Tracker</h1>
                <div class="sidebar-nav">
                    <button class="sidebar-item active" data-page="guitars"><span class="icon">🎸</span> My Guitars</button>
                    <button class="sidebar-item" data-page="strings"><span class="icon">🎵</span> String Changes</button>
                    <button class="sidebar-item" data-page="setups"><span class="icon">🔧</span> Setups & Service</button>
                    <button class="sidebar-item" data-page="settings"><span class="icon">⚙️</span> Settings</button>
                </div>
                <div class="sidebar-user">
                    <img id="desktop-avatar" src="" alt="user">
                    <span class="name" id="desktop-username"></span>
                    <button class="logout-btn" onclick="signOut()" title="Sign out">⏻</button>
                </div>
            </aside>
            <main class="desktop-main">
                <div id="d-alerts"></div>
                <div id="d-page-guitars" class="desktop-page active"></div>
                <div id="d-page-strings" class="desktop-page"></div>
                <div id="d-page-setups" class="desktop-page"></div>
                <div id="d-page-settings" class="desktop-page"></div>
            </main>
        </div>
    </div>

    <!-- MOBILE SHEETS -->
    <div class="sheet" id="sheet-guitar">
        <div class="sheet-header"><h2 id="sheet-guitar-title">Add Guitar</h2><button class="sheet-close" onclick="closeSheet('sheet-guitar')">✕</button></div>
        <input type="hidden" id="edit-guitar-id">
        <input type="hidden" id="edit-guitar-photo-url">
        <div class="form-group">
            <label>Photo</label>
            <div class="photo-upload-area" id="photo-area-mobile">
                <span class="placeholder-text" id="photo-placeholder-mobile">📷 Tap to add photo</span>
                <img id="photo-preview-mobile" style="display:none">
                <input type="file" accept="image/*" id="f-guitar-photo" onchange="previewPhoto(this, 'mobile')">
            </div>
        </div>
        <div class="form-group"><label>Name *</label><input type="text" id="f-guitar-name" placeholder="e.g. Fender Stratocaster"></div>
        <div class="form-row">
            <div class="form-group"><label>Brand</label><input type="text" id="f-guitar-brand" placeholder="Fender"></div>
            <div class="form-group"><label>Model</label><input type="text" id="f-guitar-model" placeholder="American Pro II"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Year</label><input type="number" id="f-guitar-year" placeholder="2022"></div>
            <div class="form-group"><label>Tuning</label><input type="text" id="f-guitar-tuning" placeholder="Standard E"></div>
        </div>
        <div class="form-group"><label>Notes</label><textarea id="f-guitar-notes" placeholder="Pickups, mods, serial number..."></textarea></div>
        <button class="btn btn-primary" onclick="saveGuitar()">Save Guitar</button>
    </div>

    <div class="sheet" id="sheet-string">
        <div class="sheet-header"><h2>Log String Change</h2><button class="sheet-close" onclick="closeSheet('sheet-string')">✕</button></div>
        <div class="form-group"><label>Guitar *</label><select id="f-str-guitar"></select></div>
        <div class="form-group"><label>Date *</label><input type="date" id="f-str-date"></div>
        <div class="form-group"><label>String Set *</label><input type="text" id="f-str-set" placeholder="e.g. Ernie Ball Regular Slinky 10-46"></div>
        <div class="form-group"><label>Change after (days)</label><input type="number" id="f-str-life" placeholder="e.g. 30"></div>
        <div class="form-group"><label>Notes</label><textarea id="f-str-notes" placeholder="Coated, bright tone, etc."></textarea></div>
        <button class="btn btn-primary" onclick="saveStringChange()">Save</button>
    </div>

    <div class="sheet" id="sheet-setup">
        <div class="sheet-header"><h2>Log Setup / Service</h2><button class="sheet-close" onclick="closeSheet('sheet-setup')">✕</button></div>
        <div class="form-group"><label>Guitar *</label><select id="f-setup-guitar"></select></div>
        <div class="form-group"><label>Date *</label><input type="date" id="f-setup-date"></div>
        <div class="form-group"><label>Service Type</label>
            <select id="f-setup-type">
                <option>Full Setup</option><option>Truss Rod Adjustment</option><option>Intonation</option>
                <option>Action Adjustment</option><option>Fret Level / Crown</option><option>Electronics Repair</option>
                <option>Nut Replacement</option><option>Pickup Swap</option><option>Other</option>
            </select>
        </div>
        <div class="form-group"><label>Done by</label><input type="text" id="f-setup-by" placeholder="Self, luthier, etc."></div>
        <div class="form-group"><label>Details *</label><textarea id="f-setup-details" placeholder="What was done..."></textarea></div>
        <button class="btn btn-primary" onclick="saveSetup()">Save</button>
    </div>

    <!-- DESKTOP MODALS -->
    <div class="modal-overlay" id="modal-guitar">
        <div class="modal">
            <h3 id="modal-guitar-title">Add Guitar</h3>
            <input type="hidden" id="mf-guitar-id">
            <input type="hidden" id="mf-guitar-photo-url">
            <div class="form-group">
                <label>Photo</label>
                <div class="photo-upload-area" id="photo-area-desktop">
                    <span class="placeholder-text" id="photo-placeholder-desktop">📷 Click to add photo</span>
                    <img id="photo-preview-desktop" style="display:none">
                    <input type="file" accept="image/*" id="mf-guitar-photo" onchange="previewPhoto(this, 'desktop')">
                </div>
            </div>
            <div class="form-group"><label>Name *</label><input type="text" id="mf-guitar-name" placeholder="e.g. Fender Stratocaster"></div>
            <div class="form-row">
                <div class="form-group"><label>Brand</label><input type="text" id="mf-guitar-brand" placeholder="Fender"></div>
                <div class="form-group"><label>Model</label><input type="text" id="mf-guitar-model" placeholder="American Pro II"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Year</label><input type="number" id="mf-guitar-year" placeholder="2022"></div>
                <div class="form-group"><label>Tuning</label><input type="text" id="mf-guitar-tuning" placeholder="Standard E"></div>
            </div>
            <div class="form-group"><label>Notes</label><textarea id="mf-guitar-notes" placeholder="Pickups, mods, serial..."></textarea></div>
            <div style="display:flex;gap:10px"><button class="btn btn-primary" onclick="saveGuitarDesktop()">Save</button><button class="btn btn-secondary" onclick="closeModal('modal-guitar')">Cancel</button></div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-string">
        <div class="modal">
            <h3>Log String Change</h3>
            <div class="form-group"><label>Guitar *</label><select id="mf-str-guitar"></select></div>
            <div class="form-group"><label>Date *</label><input type="date" id="mf-str-date"></div>
            <div class="form-group"><label>String Set *</label><input type="text" id="mf-str-set" placeholder="e.g. Ernie Ball Regular Slinky 10-46"></div>
            <div class="form-group"><label>Change after (days)</label><input type="number" id="mf-str-life" placeholder="30"></div>
            <div class="form-group"><label>Notes</label><textarea id="mf-str-notes"></textarea></div>
            <div style="display:flex;gap:10px"><button class="btn btn-primary" onclick="saveStringDesktop()">Save</button><button class="btn btn-secondary" onclick="closeModal('modal-string')">Cancel</button></div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-setup">
        <div class="modal">
            <h3>Log Setup / Service</h3>
            <div class="form-group"><label>Guitar *</label><select id="mf-setup-guitar"></select></div>
            <div class="form-group"><label>Date *</label><input type="date" id="mf-setup-date"></div>
            <div class="form-group"><label>Service Type</label>
                <select id="mf-setup-type">
                    <option>Full Setup</option><option>Truss Rod Adjustment</option><option>Intonation</option>
                    <option>Action Adjustment</option><option>Fret Level / Crown</option><option>Electronics Repair</option>
                    <option>Nut Replacement</option><option>Pickup Swap</option><option>Other</option>
                </select>
            </div>
            <div class="form-group"><label>Done by</label><input type="text" id="mf-setup-by"></div>
            <div class="form-group"><label>Details *</label><textarea id="mf-setup-details"></textarea></div>
            <div style="display:flex;gap:10px"><button class="btn btn-primary" onclick="saveSetupDesktop()">Save</button><button class="btn btn-secondary" onclick="closeModal('modal-setup')">Cancel</button></div>
        </div>
    </div>

    <!-- MOBILE SHEET — String Inventory -->
    <div class="sheet" id="sheet-inventory">
        <div class="sheet-header"><h2>Add String Pack</h2><button class="sheet-close" onclick="closeSheet('sheet-inventory')">✕</button></div>
        <div class="form-group"><label>Brand & Model *</label><input type="text" id="f-inv-name" placeholder="e.g. Ernie Ball Regular Slinky"></div>
        <div class="form-group"><label>Gauge *</label><input type="text" id="f-inv-gauge" placeholder="e.g. 10-46"></div>
        <div class="form-group"><label>Quantity *</label><input type="number" id="f-inv-qty" value="1" min="1"></div>
        <button class="btn btn-primary" onclick="saveInventory()">Save</button>
    </div>
    
    <!-- DESKTOP MODAL — String Inventory -->
    <div class="modal-overlay" id="modal-inventory">
        <div class="modal">
            <h3>Add String Pack</h3>
            <div class="form-group"><label>Brand & Model *</label><input type="text" id="mf-inv-name" placeholder="e.g. Ernie Ball Regular Slinky"></div>
            <div class="form-group"><label>Gauge *</label><input type="text" id="mf-inv-gauge" placeholder="e.g. 10-46"></div>
            <div class="form-group"><label>Quantity *</label><input type="number" id="mf-inv-qty" value="1" min="1"></div>
            <div style="display:flex;gap:10px"><button class="btn btn-primary" onclick="saveInventoryDesktop()">Save</button><button class="btn btn-secondary" onclick="closeModal('modal-inventory')">Cancel</button></div>
        </div>
    </div>

    
    <input type="file" id="import-input" accept=".json" style="display:none">

    <script src="app.js"></script>
</body>
</html>
