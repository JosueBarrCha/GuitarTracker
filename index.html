
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GuitarTrack">
    <link rel="manifest" href="manifest.json">
    <title>Guitar Tracker</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/11.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.9.0/firebase-storage-compat.js"></script>

    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface-2: #262626;
            --surface-3: #333;
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.15);
            --text: #f0f0f0;
            --text-muted: #888;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --border: #333;
            --radius: 14px;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }

        /* ===== AUTH SCREEN ===== */
        .auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .auth-screen h1 { font-size: 2rem; margin-bottom: 10px; }
        .auth-screen p { color: var(--text-muted); margin-bottom: 30px; }

        .auth-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 28px;
            background: white;
            color: #333;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .auth-btn:active { transform: scale(0.97); }
        .auth-btn img { width: 24px; height: 24px; }

        /* ===== APP SHELL ===== */
        .app { display: none; }
        .app.active { display: block; }

        /* ===== ALERTS BANNER ===== */
        .alerts-banner {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin: 0 16px 16px;
        }

        .alerts-banner h3 {
            font-size: 0.85rem;
            color: var(--danger);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .alert-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(248, 113, 113, 0.1);
            font-size: 0.85rem;
        }

        .alert-item:last-child { border-bottom: none; }

        .alert-item .guitar { font-weight: 600; }
        .alert-item .days { color: var(--danger); font-weight: 600; }

        .alerts-banner-warning {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .alerts-banner-warning h3 { color: var(--warning); }
        .alerts-banner-warning .days { color: var(--warning); }

        /* ===== MOBILE LAYOUT ===== */
        @media (max-width: 768px) {
            .desktop-layout { display: none !important; }

            .mobile-layout {
                display: block;
                padding-top: calc(var(--safe-top) + 10px);
                padding-bottom: calc(var(--safe-bottom) + 80px);
            }

            .mobile-header {
                padding: 12px 20px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .mobile-header h1 { font-size: 1.4rem; font-weight: 700; }

            .mobile-header .user-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                cursor: pointer;
            }

            .mobile-page { display: none; padding: 0 16px; }
            .mobile-page.active { display: block; }

            .bottom-nav {
                position: fixed;
                bottom: 0; left: 0; right: 0;
                background: var(--surface);
                border-top: 1px solid var(--border);
                display: flex;
                justify-content: space-around;
                padding: 8px 0 calc(var(--safe-bottom) + 8px);
                z-index: 100;
            }

            .nav-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2px;
                background: none;
                border: none;
                color: var(--text-muted);
                font-size: 0.7rem;
                cursor: pointer;
                padding: 5px 12px;
            }

            .nav-item.active { color: var(--accent); }
            .nav-item .icon { font-size: 1.3rem; }

            .fab {
                position: fixed;
                bottom: calc(var(--safe-bottom) + 75px);
                right: 20px;
                width: 56px; height: 56px;
                border-radius: 50%;
                background: var(--accent);
                color: white;
                border: none;
                font-size: 1.8rem;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 4px 20px rgba(255, 107, 53, 0.4);
                cursor: pointer;
                z-index: 50;
            }
        }

        /* ===== DESKTOP LAYOUT ===== */
        @media (min-width: 769px) {
            .mobile-layout { display: none !important; }

            .desktop-layout {
                display: grid;
                grid-template-columns: 240px 1fr;
                min-height: 100vh;
            }

            .desktop-sidebar {
                background: var(--surface);
                border-right: 1px solid var(--border);
                padding: 30px 20px;
                position: sticky;
                top: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }

            .desktop-sidebar h1 {
                font-size: 1.3rem;
                margin-bottom: 30px;
                padding: 0 10px;
            }

            .sidebar-nav { flex: 1; }

            .sidebar-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 14px;
                border-radius: 10px;
                background: none;
                border: none;
                color: var(--text-muted);
                font-size: 0.95rem;
                cursor: pointer;
                width: 100%;
                text-align: left;
                transition: all 0.15s;
                margin-bottom: 4px;
            }

            .sidebar-item:hover { background: var(--surface-2); color: var(--text); }
            .sidebar-item.active { background: var(--accent-glow); color: var(--accent); }
            .sidebar-item .icon { font-size: 1.2rem; }

            .sidebar-user {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px 10px;
                border-top: 1px solid var(--border);
                margin-top: 10px;
            }

            .sidebar-user img {
                width: 32px; height: 32px;
                border-radius: 50%;
            }

            .sidebar-user .name {
                font-size: 0.85rem;
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .sidebar-user .logout-btn {
                background: none;
                border: none;
                color: var(--text-muted);
                cursor: pointer;
                font-size: 1.1rem;
            }

            .desktop-main {
                padding: 40px;
                max-width: 1000px;
            }

            .desktop-main h2 {
                font-size: 1.5rem;
                margin-bottom: 5px;
            }

            .desktop-main .subtitle {
                color: var(--text-muted);
                margin-bottom: 25px;
                font-size: 0.9rem;
            }

            .desktop-page { display: none; }
            .desktop-page.active { display: block; }

            .desktop-add-btn {
                padding: 10px 20px;
                background: var(--accent);
                color: white;
                border: none;
                border-radius: 10px;
                font-size: 0.9rem;
                font-weight: 600;
                cursor: pointer;
                margin-bottom: 20px;
                transition: opacity 0.15s;
            }

            .desktop-add-btn:hover { opacity: 0.85; }

            .alerts-banner, .alerts-banner-warning {
                margin: 0 0 20px;
            }
        }

        /* ===== SHARED COMPONENTS ===== */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .card:hover { border-color: var(--surface-3); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .card-title { font-size: 1.1rem; font-weight: 600; }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
        }

        .card-field { display: flex; flex-direction: column; }
        .card-field .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
        .card-field .value { font-size: 0.9rem; margin-top: 1px; }

        /* GUITAR PHOTO */
        .guitar-card-content {
            display: flex;
            gap: 16px;
        }

        .guitar-photo {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            background: var(--surface-2);
            flex-shrink: 0;
        }

        .guitar-photo-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            background: var(--surface-2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
        }

        .guitar-card-info { flex: 1; min-width: 0; }

        @media (min-width: 769px) {
            .guitar-photo, .guitar-photo-placeholder {
                width: 100px;
                height: 100px;
            }
        }

        /* PHOTO UPLOAD */
        .photo-upload-area {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            position: relative;
            overflow: hidden;
        }

        .photo-upload-area:hover { border-color: var(--accent); }

        .photo-upload-area img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 8px;
            object-fit: cover;
        }

        .photo-upload-area .placeholder-text {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .photo-upload-area input[type="file"] {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-fresh { background: rgba(52, 211, 153, 0.15); color: var(--success); }
        .badge-due { background: rgba(251, 191, 36, 0.15); color: var(--warning); }
        .badge-overdue { background: rgba(248, 113, 113, 0.15); color: var(--danger); }
        .badge-none { background: var(--surface-2); color: var(--text-muted); }

        .history-item {
            background: var(--surface);
            border-left: 3px solid var(--accent);
            border-radius: 0 var(--radius) var(--radius) 0;
            padding: 14px 16px;
            margin-bottom: 10px;
        }

        .history-item .guitar-name { font-weight: 600; font-size: 0.95rem; }
        .history-item .date { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
        .history-item .detail { margin-top: 6px; font-size: 0.9rem; }
        .history-item .meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

        .btn { padding: 12px 20px; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; width: 100%; }
        .btn:active { opacity: 0.7; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--surface-2); color: var(--text); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-small { padding: 6px 14px; width: auto; font-size: 0.8rem; border-radius: 8px; }

        .actions { display: flex; gap: 8px; margin-top: 12px; }

        /* SHEET (full screen form - mobile) */
        .sheet {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            z-index: 200;
            overflow-y: auto;
            padding: 20px 16px calc(var(--safe-bottom) + 20px);
            padding-top: calc(var(--safe-top) + 20px);
        }

        .sheet.active { display: block; }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .sheet-header h2 { font-size: 1.3rem; }

        .sheet-close {
            background: var(--surface-2);
            border: none;
            color: var(--text);
            width: 32px; height: 32px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* MODAL (desktop form) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal h3 { margin-bottom: 20px; font-size: 1.2rem; }

        /* FORMS */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            -webkit-appearance: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .big-icon { font-size: 3rem; margin-bottom: 10px; }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        /* Settings */
        .settings-section { margin-bottom: 24px; }
        .settings-section h3 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

        .settings-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.95rem;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .settings-btn:hover { background: var(--surface-2); }
        .settings-btn .s-icon { font-size: 1.2rem; }

        /* Upload progress */
        .upload-progress {
            height: 4px;
            background: var(--surface-2);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
            display: none;
        }

        .upload-progress.active { display: block; }

        .upload-progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="auth-screen">
        <h1>🎸 Guitar Tracker</h1>
        <p>Sign in to sync your data across devices</p>
        <button class="auth-btn" onclick="signIn()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
            Sign in with Google
        </button>
    </div>

    <!-- LOADING -->
    <div id="loading-screen" class="loading" style="display:none">Loading...</div>

    <!-- APP -->
    <div id="app" class="app">

        <!-- ===== MOBILE LAYOUT ===== -->
        <div class="mobile-layout">
            <div class="mobile-header">
                <h1>🎸 Guitar Tracker</h1>
                <img id="mobile-avatar" class="user-avatar" onclick="signOut()" src="" alt="user">
            </div>

            <div id="m-alerts"></div>

            <div id="m-page-guitars" class="mobile-page active"></div>
            <div id="m-page-strings" class="mobile-page"></div>
            <div id="m-page-setups" class="mobile-page"></div>
            <div id="m-page-settings" class="mobile-page"></div>

            <button class="fab" id="m-fab" onclick="handleFab()">+</button>

            <nav class="bottom-nav">
                <button class="nav-item active" data-page="guitars"><span class="icon">🎸</span>Guitars</button>
                <button class="nav-item" data-page="strings"><span class="icon">🎵</span>Strings</button>
                <button class="nav-item" data-page="setups"><span class="icon">🔧</span>Setups</button>
                <button class="nav-item" data-page="settings"><span class="icon">⚙️</span>Settings</button>
            </nav>
        </div>

        <!-- ===== DESKTOP LAYOUT ===== -->
        <div class="desktop-layout">
            <aside class="desktop-sidebar">
                <h1>🎸 Guitar Tracker</h1>
                <div class="sidebar-nav">
                    <button class="sidebar-item active" data-page="guitars"><span class="icon">🎸</span> My Guitars</button>
                    <button class="sidebar-item" data-page="strings"><span class="icon">🎵</span> String Changes</button>
                    <button class="sidebar-item" data-page="setups"><span class="icon">🔧</span> Setups & Service</button>
                    <button class="sidebar-item" data-page="settings"><span class="icon">⚙️</span> Settings</button>
                </div>
                <div class="sidebar-user">
                    <img id="desktop-avatar" src="" alt="user">
                    <span class="name" id="desktop-username"></span>
                    <button class="logout-btn" onclick="signOut()" title="Sign out">⏻</button>
                </div>
            </aside>
            <main class="desktop-main">
                <div id="d-alerts"></div>
                <div id="d-page-guitars" class="desktop-page active"></div>
                <div id="d-page-strings" class="desktop-page"></div>
                <div id="d-page-setups" class="desktop-page"></div>
                <div id="d-page-settings" class="desktop-page"></div>
            </main>
        </div>
    </div>

    <!-- MOBILE SHEETS -->
    <div class="sheet" id="sheet-guitar">
        <div class="sheet-header"><h2 id="sheet-guitar-title">Add Guitar</h2><button class="sheet-close" onclick="closeSheet('sheet-guitar')">✕</button></div>
        <input type="hidden" id="edit-guitar-id">
        <input type="hidden" id="edit-guitar-photo-url">
        <div class="form-group">
            <label>Photo</label>
            <div class="photo-upload-area" id="photo-area-mobile">
                <span class="placeholder-text" id="photo-placeholder-mobile">📷 Tap to add photo</span>
                <img id="photo-preview-mobile" style="display:none">
                <input type="file" accept="image/*" id="f-guitar-photo" onchange="previewPhoto(this, 'mobile')">
            </div>
            <div class="upload-progress" id="upload-progress-mobile"><div class="upload-progress-bar" id="upload-bar-mobile"></div></div>
        </div>
        <div class="form-group"><label>Name *</label><input type="text" id="f-guitar-name" placeholder="e.g. Fender Stratocaster"></div>
        <div class="form-row">
            <div class="form-group"><label>Brand</label><input type="text" id="f-guitar-brand" placeholder="Fender"></div>
            <div class="form-group"><label>Model</label><input type="text" id="f-guitar-model" placeholder="American Pro II"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Year</label><input type="number" id="f-guitar-year" placeholder="2022"></div>
            <div class="form-group"><label>Tuning</label><input type="text" id="f-guitar-tuning" placeholder="Standard E"></div>
        </div>
        <div class="form-group"><label>Notes</label><textarea id="f-guitar-notes" placeholder="Pickups, mods, serial number..."></textarea></div>
        <button class="btn btn-primary" onclick="saveGuitar()">Save Guitar</button>
    </div>

    <div class="sheet" id="sheet-string">
        <div class="sheet-header"><h2>Log String Change</h2><button class="sheet-close" onclick="closeSheet('sheet-string')">✕</button></div>
        <div class="form-group"><label>Guitar *</label><select id="f-str-guitar"></select></div>
        <div class="form-group"><label>Date *</label><input type="date" id="f-str-date"></div>
        <div class="form-group"><label>String Set *</label><input type="text" id="f-str-set" placeholder="e.g. Ernie Ball Regular Slinky 10-46"></div>
        <div class="form-group"><label>Change after (days)</label><input type="number" id="f-str-life" placeholder="e.g. 30"></div>
        <div class="form-group"><label>Notes</label><textarea id="f-str-notes" placeholder="Coated, bright tone, etc."></textarea></div>
        <button class="btn btn-primary" onclick="saveStringChange()">Save</button>
    </div>

    <div class="sheet" id="sheet-setup">
        <div class="sheet-header"><h2>Log Setup / Service</h2><button class="sheet-close" onclick="closeSheet('sheet-setup')">✕</button></div>
        <div class="form-group"><label>Guitar *</label><select id="f-setup-guitar"></select></div>
        <div class="form-group"><label>Date *</label><input type="date" id="f-setup-date"></div>
        <div class="form-group"><label>Service Type</label>
            <select id="f-setup-type">
                <option>Full Setup</option><option>Truss Rod Adjustment</option><option>Intonation</option>
                <option>Action Adjustment</option><option>Fret Level / Crown</option><option>Electronics Repair</option>
                <option>Nut Replacement</option><option>Pickup Swap</option><option>Other</option>
            </select>
        </div>

    function previewPhoto(input, mode) {
        const file = input.files[0];

    async function uploadPhoto(guitarId) {
        if (!pendingPhotoFile) return null;
        const ext = pendingPhotoFile.name.split('.').pop();
        const path = `users/${currentUser.uid}/guitars/${guitarId}.${ext}`;
        const ref = storage.ref(path);

        // Compress image before upload
        const compressed = await compressImage(pendingPhotoFile, 800, 0.7);

        return new Promise((resolve, reject) => {
            const task = ref.put(compressed);
            const mode = window.innerWidth <= 768 ? 'mobile' : 'desktop';
            const progressEl = document.getElementById(`upload-progress-${mode}`);
            const barEl = document.getElementById(`upload-bar-${mode}`);
            progressEl.classList.add('active');

            task.on('state_changed',
                (snap) => {
                    const pct = (snap.bytesTransferred / snap.totalBytes) * 100;
                    barEl.style.width = pct + '%';
                },
                (err) => { progressEl.classList.remove('active'); reject(err); },
                async () => {
                    progressEl.classList.remove('active');
                    const url = await task.snapshot.ref.getDownloadURL();
                    pendingPhotoFile = null;
                    resolve(url);
                }
            );
        });
    }

    function compressImage(file, maxSize, quality) {
        return new Promise((resolve) => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.onload = () => {
                let w = img.width, h = img.height;
                if (w > maxSize || h > maxSize) {
                    if (w > h) { h = (h / w) * maxSize; w = maxSize; }
                    else { w = (w / h) * maxSize; h = maxSize; }
                }
                canvas.width = w;
                canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                canvas.toBlob(resolve, 'image/jpeg', quality);
            };
            img.src = URL.createObjectURL(file);
        });
    }

    // ============================================================

    // ============================================================
    function getStringStatus(guitarId) {
        const changes = stringChanges.filter(s => s.guitarId === guitarId).sort((a, b) => new Date(b.date) - new Date(a.date));
        if (changes.length === 0) return { cls: 'badge-none', text: 'No data', stringSet: null, daysLeft: null };
        const latest = changes[0];
        if (!latest.lifespan) return { cls: 'badge-fresh', text: 'OK', stringSet: latest.stringSet, daysLeft: null };
        const due = new Date(latest.date);
        due.setDate(due.getDate() + latest.lifespan);
        const daysLeft = Math.ceil((due - new Date()) / 86400000);
        if (daysLeft < 0) return { cls: 'badge-overdue', text: `${Math.abs(daysLeft)}d overdue`, stringSet: latest.stringSet, daysLeft };
        if (daysLeft <= 7) return { cls: 'badge-due', text: `${daysLeft}d left`, stringSet: latest.stringSet, daysLeft };
        return { cls: 'badge-fresh', text: `${daysLeft}d left`, stringSet: latest.stringSet, daysLeft };
    }

    function getAlerts() {
        const overdue = [];
        const dueSoon = [];
        guitars.forEach(g => {
            const status = getStringStatus(g.id);
            if (status.daysLeft !== null && status.daysLeft < 0) {
                overdue.push({ name: g.name, days: Math.abs(status.daysLeft), id: g.id });
            } else if (status.daysLeft !== null && status.daysLeft <= 7) {
                dueSoon.push({ name: g.name, days: status.daysLeft, id: g.id });
            }
        });
        return { overdue, dueSoon };
    }

    function renderAlerts() {
        const { overdue, dueSoon } = getAlerts();
        let html = '';

        if (overdue.length > 0) {
            html += `<div class="alerts-banner">
                <h3>⚠️ Strings Overdue</h3>
                ${overdue.map(a => `<div class="alert-item"><span class="guitar">${a.name}</span><span class="days">${a.days}d overdue</span></div>`).join('')}
            </div>`;
        }

        if (dueSoon.length > 0) {
            html += `<div class="alerts-banner alerts-banner-warning">
                <h3>🔔 Change Soon</h3>
                ${dueSoon.map(a => `<div class="alert-item"><span class="guitar">${a.name}</span><span class="days">${a.days}d left</span></div>`).join('')}
            </div>`;
        }

        document.getElementById('m-alerts').innerHTML = html;
        document.getElementById('d-alerts').innerHTML = html;
    }

                const ss = getStringStatus(g.id);
                const lastSetup = setups.filter(s => s.guitarId === g.id)[0];
                const photoHtml = g.photoURL
                    ? `<img class="guitar-photo" src="${g.photoURL}" alt="${g.name}">`
                    : `<div class="guitar-photo-placeholder">🎸</div>`;
                return `<div class="card">
                    <div class="card-header">
                        <span class="card-title">${g.name}</span>
                        <span class="badge ${ss.cls}">${ss.text}</span>
                    </div>
                    <div class="guitar-card-content">
                        ${photoHtml}
                        <div class="guitar-card-info">
                            <div class="card-grid">
                                ${g.brand ? `<div class="card-field"><span class="label">Brand</span><span class="value">${g.brand}</span></div>` : ''}
                                ${g.model ? `<div class="card-field"><span class="label">Model</span><span class="value">${g.model}</span></div>` : ''}
                                ${g.tuning ? `<div class="card-field"><span class="label">Tuning</span><span class="value">${g.tuning}</span></div>` : ''}
                                ${ss.stringSet ? `<div class="card-field"><span class="label">Current Strings</span><span class="value">${ss.stringSet}</span></div>` : ''}
                                <div class="card-field"><span class="label">Last Setup</span><span class="value">${lastSetup ? `${lastSetup.date} · ${lastSetup.type}` : '—'}</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn btn-secondary btn-small" onclick="${isMobile ? `editGuitarMobile('${g.id}')` : `editGuitarDesktop('${g.id}')`}">Edit</button>
                        <button class="btn btn-danger btn-small" onclick="deleteGuitar('${g.id}')">Delete</button>
                    </div>
                </div>`;
            }).join('');

        document.getElementById('m-page-guitars').innerHTML = html;
        document.getElementById('d-page-guitars').innerHTML = `
            <h2>My Guitars</h2>
            <p class="subtitle">${guitars.length} guitar${guitars.length !== 1 ? 's' : ''} in your collection</p>
            <button class="desktop-add-btn" onclick="openModal('modal-guitar', true)">+ Add Guitar</button>
            ${html}
        `;
    }

    function renderStrings() {
        const html = stringChanges.length === 0
            ? '<div class="empty-state"><div class="big-icon">🎵</div><p>No string changes logged yet.</p></div>'
            : stringChanges.map(s => {
                const g = guitars.find(x => x.id === s.guitarId);
                return `<div class="history-item">
                    <div style="display:flex;justify-content:space-between;align-items:center">
                        <span class="guitar-name">${g ? g.name : 'Unknown'}</span>
                        <button class="btn btn-danger btn-small" onclick="deleteStringChange('${s.id}')">✕</button>
                    </div>
                    <div class="date">${s.date}</div>
                    <div class="detail">🎵 ${s.stringSet}</div>
                    ${s.lifespan ? `<div class="meta">⏱ Change after ${s.lifespan} days</div>` : ''}
                    ${s.notes ? `<div class="meta">${s.notes}</div>` : ''}
                </div>`;
            }).join('');

        document.getElementById('m-page-strings').innerHTML = html;
        document.getElementById('d-page-strings').innerHTML = `
            <h2>String Changes</h2>
            <p class="subtitle">${stringChanges.length} entries</p>
            <button class="desktop-add-btn" onclick="openModal('modal-string')">+ Log String Change</button>
            ${html}
        `;
    }

    function renderSetups() {
        const html = setups.length === 0
            ? '<div class="empty-state"><div class="big-icon">🔧</div><p>No setups logged yet.</p></div>'
            : setups.map(s => {
                const g = guitars.find(x => x.id === s.guitarId);
                return `<div class="history-item">
                    <div style="display:flex;justify-content:space-between;align-items:center">
                        <span class="guitar-name">${g ? g.name : 'Unknown'}</span>
                        <button class="btn btn-danger btn-small" onclick="deleteSetup('${s.id}')">✕</button>
                    </div>
                    <div class="date">${s.date} · ${s.type}</div>
                    ${s.doneBy ? `<div class="meta">Done by: ${s.doneBy}</div>` : ''}
                    <div class="detail">${s.details}</div>
                </div>`;
            }).join('');

        document.getElementById('m-page-setups').innerHTML = html;
        document.getElementById('d-page-setups').innerHTML = `
            <h2>Setups & Service</h2>
            <p class="subtitle">${setups.length} entries</p>
            <button class="desktop-add-btn" onclick="openModal('modal-setup')">+ Log Setup</button>
            ${html}
        `;
    }

    function renderSettings() {
        const settingsHtml = `
            <div class="settings-section">
                <h3>Data</h3>
                <button class="settings-btn" onclick="exportData()"><span class="s-icon">📤</span> Export Backup (JSON)</button>
                <button class="settings-btn" onclick="document.getElementById('import-input').click()"><span class="s-icon">📥</span> Import Backup</button>
            </div>
            <div class="settings-section">
                <h3>Account</h3>
                <button class="settings-btn" onclick="signOut()"><span class="s-icon">🚪</span> Sign Out</button>
            </div>
        `;
        document.getElementById('m-page-settings').innerHTML = settingsHtml;
        document.getElementById('d-page-settings').innerHTML = `<h2>Settings</h2><p class="subtitle">Manage your data and account</p>${settingsHtml}`;
    }

    // ============================================================
    // EXPORT / IMPORT
    // ============================================================
    function exportData() {
        const data = { guitars, stringChanges, setups, exportDate: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `guitar-tracker-${todayStr()}.json`;
        a.click();
    }

    document.getElementById('import-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
            const text = await file.text();
            const data = JSON.parse(text);
            if (!confirm(`Import ${data.guitars?.length || 0} guitars, ${data.stringChanges?.length || 0} string changes, ${data.setups?.length || 0} setups? This REPLACES current data.`)) return;

            const gSnap = await userCol('guitars').get();
            const sSnap = await userCol('stringChanges').get();
            const uSnap = await userCol('setups').get();
            const batch = firestore.batch();
            gSnap.docs.forEach(d => batch.delete(d.ref));
            sSnap.docs.forEach(d => batch.delete(d.ref));
            uSnap.docs.forEach(d => batch.delete(d.ref));
            await batch.commit();

            for (const g of (data.guitars || [])) { const { id, ...rest } = g; await userCol('guitars').add(rest); }
            for (const s of (data.stringChanges || [])) { const { id, ...rest } = s; await userCol('stringChanges').add(rest); }
            for (const s of (data.setups || [])) { const { id, ...rest } = s; await userCol('setups').add(rest); }
            alert('Import complete!');
        } catch (err) { alert('Import failed: ' + err.message); }
        e.target.value = '';
    });

    // Service Worker
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

        </script>
</body>
</html>
